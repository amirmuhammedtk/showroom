{% extends 'showroom/showroomhome.html' %}
{% block body %}

<style>
    body {
        background: #f5f7fa;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        color: #2d3748;
    }

    .wrapper {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 40px 20px;
        background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
    }

    .card-form {
        width: 100%;
        max-width: 520px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
        padding: 40px 45px;
        margin: 20px auto;
    }

    .title {
        text-align: center;
        margin-bottom: 38px;
    }

    .title h2 {
        font-size: 2rem;
        font-weight: 700;
        color: #1a365d;
        margin-bottom: 8px;
    }

    .title p {
        color: #64748b;
        font-size: 1rem;
        margin: 0;
    }

    .form-group {
        margin-bottom: 24px;
        position: relative;
    }

    label {
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 8px;
        display: block;
        font-size: 0.95rem;
    }

    .required {
        color: #ef4444;
        margin-left: 4px;
    }

    .input {
        width: 100%;
        padding: 12px 16px;
        padding-right: 48px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 1rem;
        background: #ffffff;
        transition: all 0.2s ease;
    }

    .input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
        outline: none;
    }

    .password-toggle {
        position: absolute;
        right: 16px;
        top: 63%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #64748b;
        font-size: 1.1rem;
        user-select: none;
    }

    .messages-container {
        margin-bottom: 24px;
    }

    .alert {
        padding: 14px 18px;
        border-radius: 8px;
        font-size: 0.95rem;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .alert-success {
        background: #d1fae5;
        color: #065f46;
        border: 1px solid #a7f3d0;
    }

    .alert-warning {
        background: #fef3c7;
        color: #92400e;
        border: 1px solid #fde68a;
    }

    .btns {
        display: flex;
        gap: 16px;
        margin-top: 32px;
    }

    .btn {
        flex: 1;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .btn-update {
        background: #2563eb;
        color: white;
    }

    .btn-update:hover {
        background: #1d4ed8;
        transform: translateY(-1px);
    }

    .btn-cancel {
        background: #6b7280;
        color: white;
    }

    .btn-cancel:hover {
        background: #4b5563;
        transform: translateY(-1px);
    }

    @media (max-width: 576px) {
        .card-form {
            padding: 30px 25px;
        }
        .btns {
            flex-direction: column;
            gap: 12px;
        }
    }
</style>

<div class="wrapper">
    <div class="card-form">
        <div class="title">
            <h2>Change Password</h2>
            <p>Update your ShowRoom account password</p>
        </div>

        <!-- Show only backend messages -->
        <div class="messages-container">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-warning{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        </div>

        <form method="POST" action="/myapp/admin_changePassword_post/">
            {% csrf_token %}

            <div class="form-group">
                <label for="currentpassword">Current Password <span class="required">*</span></label>
                <input
                    type="password"
                    name="currentpassword"
                    id="currentpassword"
                    class="input"
                    required
                    autocomplete="current-password">
                <span class="password-toggle" onclick="togglePassword('currentpassword')">👁️</span>
            </div>

            <div class="form-group">
                <label for="newpassword">New Password <span class="required">*</span></label>
                <input
                    type="password"
                    name="newpassword"
                    id="newpassword"
                    class="input"
                    required
                    minlength="8"
                    autocomplete="new-password">
                <span class="password-toggle" onclick="togglePassword('newpassword')">👁️</span>
            </div>

            <div class="form-group">
                <label for="confirmpassword">Confirm New Password <span class="required">*</span></label>
                <input
                    type="password"
                    name="confirmpassword"
                    id="confirmpassword"
                    class="input"
                    required
                    minlength="8"
                    autocomplete="new-password">
                <span class="password-toggle" onclick="togglePassword('confirmpassword')">👁️</span>
            </div>

            <div class="btns">
                <button type="submit" class="btn btn-update">Update Password</button>
                <button type="button" class="btn btn-cancel"
                        onclick="window.location.href='/myapp/adminhome/'">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Password show/hide toggle
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const toggleIcon = field.nextElementSibling;

        if (field.type === "password") {
            field.type = "text";
            toggleIcon.textContent = "🙈";
        } else {
            field.type = "password";
            toggleIcon.textContent = "👁️";
        }
    }
</script>

{% endblock %}
