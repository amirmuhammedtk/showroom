<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-900 to-blue-800">

    <div class="bg-gray-900 shadow-lg rounded-xl p-8 w-full max-w-md">
        <h2 class="text-3xl font-bold text-white text-center mb-6">Forgot Password</h2>
        <p class="text-gray-300 text-center mb-6">
            Enter your registered email to reset your password.
        </p>

        <!-- Messages -->
        {% if messages %}
        <ul class="mb-4">
            {% for message in messages %}
                <li class="text-yellow-400">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form action="/myapp/forgotpassword_post/" method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-gray-300 mb-1" for="email">Email</label>
                <input type="email" name="email" id="email" required
                    class="w-full px-4 py-2 rounded-md bg-gray-800 text-white border border-gray-700 focus:border-blue-500 focus:outline-none">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-md font-semibold transition-colors">
                Reset Password
            </button>
        </form>

        <p class="text-gray-400 text-sm mt-4 text-center">
            Remembered your password? 
            <a href="/myapp/login_get/" class="text-blue-400 hover:text-blue-300">Login here</a>
        </p>
    </div>

</body>
</html>
