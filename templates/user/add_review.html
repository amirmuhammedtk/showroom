{% extends 'user/userhome.html' %}
{% block body %}

<div class="container mt-5">
<div class="card shadow p-4">
<h3 class="text-center mb-4">Rate Service</h3>

<form method="post" action="/myapp/add_review_post/">
{% csrf_token %}

<input type="hidden" name="bill" value="{{bill.id}}">

<label>Rating</label>
<select name="rating" class="form-control mb-3">
<option>5</option>
<option>4</option>
<option>3</option>
<option>2</option>
<option>1</option>
</select>

<label>Comment</label>
<textarea name="comment" class="form-control mb-3"></textarea>

<button class="btn btn-success w-100">Submit Review</button>
</form>

</div>
</div>

{% endblock %}
