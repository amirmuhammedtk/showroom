{% extends 'user/userhome.html' %}
{% block body %}

<style>
.wrapper{max-width:900px;margin:auto;padding:30px}
.order{
background:white;padding:18px;border-radius:14px;margin-bottom:15px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
display:flex;justify-content:space-between;align-items:center
}
.status{padding:6px 14px;border-radius:20px;font-weight:600}
.paid{background:#dcfce7;color:#166534}
.pending{background:#fef3c7;color:#854d0e}
</style>

<div class="wrapper">
<h2 style="text-align:center;margin-bottom:25px">My Orders</h2>
{% for i in data %}

<div class="order-card">
    <h4>Order #{{i.id}}</h4>
    <p>Amount : ₹ {{i.amount}}</p>

    {% if i.status == "paid" %}
        <span class="badge bg-success">Paid</span>
    {% else %}
    <a href="/myapp/payorder/{{i.id}}/" class="btn btn-warning">Pay Now</a>
    {% endif %}
</div>
{% endfor %}


</div>
{% endblock %}
